name: Build Node.js ARM64 musl

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js 版本 (如 22.16.0)'
        required: true
        default: '22.16.0'

jobs:
  build:
    name: Build Node.js ${{ github.event.inputs.node_version }} ARM64 musl
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build Node.js ARM64 musl portable
        run: |
          NODE_VER="${{ github.event.inputs.node_version }}"
          mkdir -p dist

          echo "=== Building Node.js v${NODE_VER} ARM64 musl portable tarball ==="

          # 将构建脚本写入临时文件，避免 YAML 嵌套 heredoc 导致解析错误
          cat > /tmp/build-node.sh << 'BUILDSCRIPT'
set -e
apk add --no-cache nodejs npm xz

ACTUAL_VER=$(node --version | sed 's/^v//')
echo "Alpine Node.js version: v${ACTUAL_VER} (requested: v${NODE_VER})"

PKG_NAME="node-v${NODE_VER}-linux-arm64-musl"
PKG_DIR="/tmp/${PKG_NAME}"
mkdir -p "${PKG_DIR}/bin" "${PKG_DIR}/lib/node_modules" "${PKG_DIR}/include/node"

cp $(which node) "${PKG_DIR}/bin/"
chmod +x "${PKG_DIR}/bin/node"

if [ -d /usr/lib/node_modules/npm ]; then
  cp -r /usr/lib/node_modules/npm "${PKG_DIR}/lib/node_modules/"
fi

# 创建 npm wrapper
printf '#!/bin/sh\nexec "$(dirname "$0")/node" "$(dirname "$0")/../lib/node_modules/npm/bin/npm-cli.js" "$@"\n' \
  > "${PKG_DIR}/bin/npm"
# 创建 npx wrapper
printf '#!/bin/sh\nexec "$(dirname "$0")/node" "$(dirname "$0")/../lib/node_modules/npm/bin/npx-cli.js" "$@"\n' \
  > "${PKG_DIR}/bin/npx"
chmod +x "${PKG_DIR}/bin/npm" "${PKG_DIR}/bin/npx"

echo "=== Verification ==="
"${PKG_DIR}/bin/node" --version
"${PKG_DIR}/bin/node" -e "console.log(process.arch, process.platform, process.versions.modules)"
"${PKG_DIR}/bin/npm" --version 2>/dev/null || echo "npm wrapper created"

cd /tmp
tar cJf "/output/${PKG_NAME}.tar.xz" "${PKG_NAME}"
ls -lh "/output/${PKG_NAME}.tar.xz"
echo "=== Done: ${PKG_NAME}.tar.xz ==="
BUILDSCRIPT

          docker run --rm --platform linux/arm64 \
            -v "$PWD/dist:/output" \
            -v "/tmp/build-node.sh:/build-node.sh:ro" \
            -e "NODE_VER=${NODE_VER}" \
            alpine:3.21 sh /build-node.sh

      - name: Verify tarball
        run: |
          echo "=== Output files ==="
          ls -lh dist/
          echo ""
          echo "=== Tarball contents (first 20 entries) ==="
          tar tJf dist/*.tar.xz | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-arm64-musl
          path: dist/*.tar.xz

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: node-bins
          name: "Node.js Prebuilt Binaries (musl)"
          files: dist/*.tar.xz
          draft: false
          prerelease: false
          make_latest: false
          body: |
            预编译的 Node.js ARM64 musl 二进制文件，供 ARM64 OpenWrt/iStoreOS 设备使用。

            Node.js 官方 [unofficial-builds](https://unofficial-builds.nodejs.org/) 仅提供 x64 musl 构建，不提供 ARM64 musl。
            此 Release 使用 Alpine Linux ARM64 (musl libc) 环境打包。

            **注意**: 实际 Node.js 版本可能与文件名中的版本略有差异（取决于 Alpine 仓库提供的版本），
            但主版本号 (v22.x) 保证兼容。

            `openclaw-env setup` 会在 ARM64 musl 设备上自动从此处下载。
